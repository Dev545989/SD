name: Extract Dubizzle Phone Number

on:
  # تشغيل يدوي من GitHub UI
  workflow_dispatch:
    inputs:
      listing_url:
        description: 'Dubizzle listing URL'
        required: true
        default: 'https://www.dubizzle.sa/en/ad/للبيع-لكزس-es350-موديل-2015-ID110681220.html'
      headless:
        description: 'Run in headless mode'
        type: boolean
        default: true

  # أو تشغيل تلقائي كل ساعة (اختياري)
  # schedule:
  #   - cron: '0 * * * *'

jobs:
  extract-phone:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright playwright-stealth

      - name: Install Playwright browsers
        run: |
          playwright install chromium

      - name: Run extraction script
        env:
          LISTING_URL: ${{ github.event.inputs.listing_url || 'https://www.dubizzle.sa/en/ad/للبيع-لكزس-es350-موديل-2015-ID110681220.html' }}
        run: |
          python get_phone_numb.py

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: |
            button_not_found.png
            after_click.png

      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extraction-result
          path: result.json